services:
  redis:
    image: redis:7.0-alpine
    container_name: undercover-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - undercover_redis_data:/data
    environment:
      - TZ=Asia/Shanghai
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mysql:
    image: mysql:8.4
    container_name: undercover-mysql
    restart: always
    ports:
      - "3306:3306"
    volumes:
      - undercover_mysql_data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=undercover
      - MYSQL_USER=undercover
      - MYSQL_PASSWORD=undercover
      - TZ=Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  undercover_redis_data:
  undercover_mysql_data:
